name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # آپدیت شد

      - name: Set up Python
        uses: actions/setup-python@v5 # آپدیت شد
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install flet pandas

      - name: Build APK
        run: |
          flet build apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4 # این همان بخشی است که ارور می‌داد و حالا اصلاح شد
        with:
          name: app-release
          path: build/apk/*.apk
